<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>서울교통공사</title>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" type="text/css" href="../../css/common.css">

    <script src="../../js/jquery-3.5.1.min.js"></script>
    <script src="../../js/swiper-bundle.min.js"></script>
    <script src="../../js/common.js"></script>
</head>

<body>
    <div class="container">

        <div id="header"></div>
        <!-- img_profile_icon02 Attend -->

        <div class="contents">
            <div class="comm_pdd_no pt10">
                
                <div class="area_profile">
                    <img src="../../img/img_profile_icon02.svg" alt="" class="ico_profile">
                    <div class="left_box">
                        <span class="txt01">정비5부분</span>
                        <span class="txt02">김김교통<span class="txt03">님</span></span>
                    </div>
                    <div class="right_box">
                        <button type="button" class="btn_attend">
                            <span class="txt01">출석체크</span>
                        </button>
                    </div>
                </div>

                <div class="area_table01 mt10">
                    <table class="box_table02">
                        <caption class="blind">출석체크</caption>
                        <colgroup>
                            <col style="width: 50%;">
                            <col style="width: 50%;">
                        </colgroup>
                        <tbody>
                            <tr>
                                <td><span class="txt01">오늘의 교육(회의)정보</span></td>
                                <td><span class="txt02">2026-03-30</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="divider04">
                <i class="blind">구분선</i>
            </div>
            
            <!-- 조회대상 -->
            <div class="comm_30de">
                <div class="board_header">
                    <span class="txt01">조회결과</span>
                    <span class="txt02">총<span class="txt03">32</span>건</span>
                </div>
                <ul class="board_box03">
                    <li>
                        <div class="result_contnet03">
                            <span class="txt01">2026년 1분기 철도 안전(실기) 교육(상계승무사업소)</span>
                            <ul class="info">
                                <li><span class="txt02">2026-03-30 09:30</span></li>
                                <li><span class="line"><i class="blind">구분선</i></span></li>
                                <li><span class="txt02">창동차량기지 유치선</span></li>
                                <li><span class="line"><i class="blind">구분선</i></span></li>
                                <li><span class="txt04">박놀부</span></li>
                            </ul>
                        </div>
                    </li>
                    <li>
                        <div class="result_contnet03">
                            <span class="txt01">2026년 1분기 철도안전직무 교육(수서승무사업소)</span>
                            <ul class="info">
                                <li><span class="txt02">2026-03-30 09:30</span></li>
                                <li><span class="line"><i class="blind">구분선</i></span></li>
                                <li><span class="txt02">교양실 및 유치선</span></li>
                                <li><span class="line"><i class="blind">구분선</i></span></li>
                                <li><span class="txt04">조영직</span></li>
                            </ul>
                        </div>
                    </li>
                </ul>
                <button type="button" class="btn_more mt20">
                    <span class="txt01">더보기</span>
                </button>
            </div>
        </div>
        <!-- <div class="footer">
            <div class="area_footer04">
                <button type="button" class="btn_tertiary">
                    <span class="txt">조회화면</span>
                </button>
            </div>
        </div> -->
    </div>

    <button class="btn_top">
        <i class="blind">위로이동</i>
    </button>

</body>

</html>
