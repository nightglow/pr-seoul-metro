<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>서울교통공사</title>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" type="text/css" href="../../css/common.css">

    <script src="../../js/jquery-3.5.1.min.js"></script>
    <script src="../../js/swiper-bundle.min.js"></script>
    <script src="../../js/common.js"></script>
</head>

<body>
    <div class="container">

        <div id="header"></div>

        <div class="contents">
            <div class="common_tit04">
                <div class="left_box01">
                    <span class="txt01">재물조사 대상</span>
                </div>
            </div>
            <div class="area_wealth">
                <ul class="common_content01">
                    <!-- 사업영역 -->
                    <li>
                        <div class="a_group01"><!-- error, sucess 클래스 추가-->
                            <label class="area_tit01">
                                <div class="left_box">
                                    <span class="txt01">사업영역</span>
                                </div>
                                <div class="right_box mt6">
                                    <div class="com_inp01">
                                        <input type="text" class="inp_comm" placeholder="사업영역을 선택하세요." name="0"
                                            value="" disabled/>
                                        <span class="ico_arr">
                                            <i class="blind">선택표시</i>
                                        </span>
                                    </div>
                                </div>
                            </label>
                            <span class="reply">택스트를 입력하세요.</span>
                        </div>
                    </li>
                    <!-- 재물조사 년도 -->
                    <li>
                        <div class="a_group01"><!-- error, sucess 클래스 추가-->
                            <label class="area_tit01">
                                <div class="left_box">
                                    <span class="txt01">재물조사 년도</span>
                                    <span class="txt02">*</span>
                                </div>
                                <div class="right_box mt6">
                                    <div class="com_inp01">
                                        <input type="text" class="inp_comm" placeholder="재물조사 연도를 선택하세요." name="0"
                                            value="" disabled/>
                                        <span class="ico_arr">
                                            <i class="blind">선택표시</i>
                                        </span>
                                    </div>
                                </div>
                            </label>
                            <span class="reply">택스트를 입력하세요.</span>
                        </div>
                    </li>
                </ul>
            </div>

            <div class="common_tit04">
                <div class="left_box01">
                    <span class="txt01">선택 조건</span>
                </div>
            </div>
            <div class="area_wealth">
                <ul class="common_content01">
                    <!-- 자산 클래스 -->
                    <li>
                        <div class="a_group01"><!-- error, sucess 클래스 추가-->
                            <label class="area_tit01">
                                <div class="left_box">
                                    <span class="txt01">자산 클래스</span>
                                </div>
                                <div class="right_box mt6">
                                    <div class="com_inp01">
                                        <input type="text" class="inp_comm" placeholder="자산 클래스를 선택하세요." name="0"
                                            value="" disabled/>
                                        <span class="ico_arr">
                                            <i class="blind">선택표시</i>
                                        </span>
                                    </div>
                                </div>
                            </label>
                            <span class="reply">택스트를 입력하세요.</span>
                        </div>
                    </li>
                    <!-- 코스트 센터 -->
                    <li>
                        <div class="a_group01"><!-- error, sucess 클래스 추가-->
                            <label class="area_tit01">
                                <div class="left_box">
                                    <span class="txt01">코스트 센터</span>
                                    <span class="txt02">*</span>
                                </div>
                                <div class="right_box mt6">
                                    <div class="com_inp02">
                                        <input type="text" class="inp_comm" placeholder="코스트 센터를 검색하세요." name="0"
                                            value="" disabled/>
                                        <span class="ico_arr">
                                            <i class="blind">선택표시</i>
                                        </span>
                                    </div>
                                </div>
                            </label>
                            <span class="reply">택스트를 입력하세요.</span>
                        </div>
                    </li>
                    <!-- 플랜트 -->
                    <li>
                        <div class="a_group01"><!-- error, sucess 클래스 추가-->
                            <label class="area_tit01">
                                <div class="left_box">
                                    <span class="txt01">플랜트</span>
                                </div>
                                <div class="right_box mt6">
                                    <div class="com_inp01">
                                        <input type="text" class="inp_comm" placeholder="플랜트를 선택하세요." name="0"
                                            value="" disabled/>
                                        <span class="ico_arr">
                                            <i class="blind">선택표시</i>
                                        </span>
                                    </div>
                                </div>
                            </label>
                            <span class="reply">택스트를 입력하세요.</span>
                        </div>
                    </li>
                </ul>
            </div>

            <div class="comm_pd20 mt10">
                <div class="common_tit01">
                    <div class="left_box01">
                        <span class="txt01">재물조사 조회대상</span>
                    </div>
                </div>
                <div class="tab_btn_wrap01">
                    <fieldset class="tab-group radio" role="radiogroup">
                        <legend class="blind">재물조사 조회대상 선택</legend>
                        <label class="tab-item">
                            <input type="radio" name="q01" value="answer1" checked>
                            <span class="tab-btn">전체</span>
                        </label>
                        <label class="tab-item">
                            <input type="radio" name="q01" value="answer2">
                            <span class="tab-btn">처리건만 표시</span>
                        </label>
                        <label class="tab-item">
                            <input type="radio" name="q01" value="answer3">
                            <span class="tab-btn">미처리건만 표시</span>
                        </label>
                    </fieldset>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="area_footer02">
                <div class="f_group01">
                    <button type="button" class="btn_primary">
                        <span class="txt">조회</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- <button class="btn_top">
        <i class="blind">위로이동</i>
    </button> -->

</body>

</html>
