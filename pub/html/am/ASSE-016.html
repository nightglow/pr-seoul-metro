<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>서울교통공사</title>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" type="text/css" href="../../css/common.css">

    <script src="../../js/jquery-3.5.1.min.js"></script>
    <script src="../../js/swiper-bundle.min.js"></script>
    <script src="../../js/common.js"></script>
</head>

<body>
    <button type="button" class="btn_primary" onclick="Fullpopup.open('full01')">
        <span class="txt">재물조사 QR코드인식</span>
    </button>

    <div class="full_popup_dim" data-full="full01">
        <div class="full_popup_wrap scl"><!-- scl : 스크롤클래스 추가 -->
            <div class="left_box">
                <div class="area_tit01">
                    <span class="txt01">재물조사 QR코드인식</span>
                </div>
                <div class="area_content01">
                    <button class="btn_close" onclick="Fullpopup.close('full01')">
                        <i class="blind">닫기</i>
                    </button>
                </div>
            </div>
            <div class="right_box">
                <div class="comm_pdd_no pt10">
                    <div class="area_table01">
                        <table class="box_table01">
                            <caption class="blind">재물조사 실사 목록</caption>
                            <colgroup>
                                <col style="width: 35%;">
                                <col style="width: 65%;">
                            </colgroup>
                            <tbody>
                                <tr>
                                    <td><span class="txt01">조사년도</span></td>
                                    <td><span class="txt02">2026</span></td>
                                </tr>
                                <tr>
                                    <td><span class="txt01">자산클래스</span></td>
                                    <td><span class="txt02">1800, 공기구비품</span></td>
                                </tr>
                                <tr>
                                    <td><span class="txt01">코스트센터</span></td>
                                    <td><span class="txt02">10026, 경영지원.재무처</span></td>
                                </tr>
                                <tr>
                                    <td><span class="txt01">예산관리센터</span></td>
                                    <td><span class="txt02">10026, 재무처</span></td>
                                </tr>
                                <tr>
                                    <td><span class="txt01">플랜트</span></td>
                                    <td><span class="txt02">1000, 본사</span></td>
                                </tr>
                                <tr>
                                    <td><span class="txt01">실사자</span></td>
                                    <td><span class="txt02">김교통 23145512</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- <div class="divider04">
                    <i class="blind">구분선</i>
                </div> -->

                <div class="comm_pdd_no mt20">
                    <div class="common_tit01">
                        <div class="left_box01">
                            <span class="txt01">예산관리센터</span>
                        </div>
                    </div>
                    <div class="tab_btn_wrap">
                        <fieldset class="tab-group radio" role="radiogroup">
                            <legend class="blind">재물조사 조회대상 선택</legend>
                            <label class="tab-item">
                                <input type="radio" name="q01" value="answer1" checked>
                                <span class="tab-btn">중고품(수리불필요)</span>
                            </label>
                            <label class="tab-item">
                                <input type="radio" name="q01" value="answer2">
                                <span class="tab-btn">중고품(수리필요)</span>
                            </label>
                        </fieldset>
                    </div>

                    <div class="people02 mt12">
                        <div class="left_box">
                            <div class="area_tit01">
                                <span class="txt01">불용대상여부</span>
                            </div>
                        </div>
                        <div class="right_box">
                            <div class="f_group24">
                                <select name="" class="btn_year">
                                    <option value="" selected>해당없음</option>
                                    <option value="">불용 후 미 구매</option>
                                    <option value="">수급반영</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="comm_30de mt12">
                    <div class="common_tit01">
                        <div class="left_box01">
                            <span class="txt01">대상 외 실사 : 타 소속물품 재물조사</span>
                        </div>
                    </div>
                    <div class="tab_btn_wrap">
                        <fieldset class="tab-group radio" role="radiogroup">
                            <legend class="blind">재물조사 조회대상 선택</legend>
                            <label class="tab-item">
                                <input type="radio" name="q02" value="answer1" checked>
                                <span class="tab-btn">예</span>
                            </label>
                            <label class="tab-item">
                                <input type="radio" name="q02" value="answer2">
                                <span class="tab-btn">아니요</span>
                            </label>
                        </fieldset>
                    </div>
                </div>
            
            </div>

            <div class="footer">
                <div class="area_footer04">
                    <button type="button" class="btn_quaternary">
                        <span class="txt">QR코드 인증 계속</span>
                    </button>
                    <button type="button" class="btn_secondary">
                        <span class="txt">확인</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <button class="btn_top">
        <i class="blind">위로이동</i>
    </button>
    
</body>

</html>
