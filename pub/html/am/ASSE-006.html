<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>서울교통공사</title>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" type="text/css" href="../../css/common.css">

    <script src="../../js/jquery-3.5.1.min.js"></script>
    <script src="../../js/swiper-bundle.min.js"></script>
    <script src="../../js/common.js"></script>
</head>

<body>
    <div class="container">

        <div id="header"></div>

        <div class="contents">
            <div class="comm_pdd_no mt10"><!-- comm_80de -->
                <div class="area_common01">
                    <ul class="common_content01">
                        <!-- 자재유형 -->
                        <li>
                            <div class="a_group01"><!-- error, sucess 클래스 추가-->
                                <label class="area_tit01">
                                    <div class="left_box">
                                        <span class="txt01">자재유형</span>
                                        <span class="txt02">*</span>
                                    </div>
                                    <div class="right_box mt6">
                                        <div class="com_inp01">
                                            <input type="text" class="inp_comm" placeholder="차량운반구" name="0"
                                                value="" disabled/>
                                            <span class="ico_arr">
                                                <i class="blind">선택표시</i>
                                            </span>
                                        </div>
                                    </div>
                                </label>
                                <span class="reply">택스트를 입력하세요.</span>
                            </div>
                        </li>
                        <!-- 플랜트 -->
                        <li>
                            <div class="a_group01"><!-- error, sucess 클래스 추가-->
                                <label class="area_tit01">
                                    <div class="left_box">
                                        <span class="txt01">플랜트</span>
                                    </div>
                                    <div class="right_box mt6">
                                        <div class="com_inp01">
                                            <input type="text" class="inp_comm" placeholder="플랜트를 선택하세요." name="0"
                                                value="" disabled/>
                                            <span class="ico_arr">
                                                <i class="blind">선택표시</i>
                                            </span>
                                        </div>
                                    </div>
                                </label>
                                <span class="reply">택스트를 입력하세요.</span>
                            </div>
                        </li>
                    </ul>
                </div>
                <div class="area_common01 mt12">
                    <ul class="common_content01">
                        <!-- 사업영역 -->
                        <li>
                            <div class="common_tit01">
                                <div class="left_box01">
                                    <span class="txt01">사업영역</span>
                                    <!-- <span class="txt02">*</span> -->
                                </div>
                            </div>
                            <fieldset class="tab-group radio" role="radiogroup">
                                <legend class="blind">상태</legend>
                                <label class="tab-item">
                                    <input type="radio" name="q01" value="answer1" checked>
                                    <span class="tab-btn">1000</span>
                                </label>
                                <label class="tab-item">
                                    <input type="radio" name="q01" value="answer2">
                                    <span class="tab-btn">9000</span>
                                </label>
                            </fieldset>
                        </li>
                        <!-- 예산관리센터 -->
                        <li>
                            <div class="a_group01"><!-- error, sucess 클래스 추가-->
                                <label class="area_tit01">
                                    <div class="left_box">
                                        <span class="txt01">플랜트</span>
                                        <!-- <span class="txt02">*</span> -->
                                    </div>
                                    <div class="right_box mt6">
                                        <div class="com_inp01">
                                            <input type="text" class="inp_comm" placeholder="예산관리센터를 선택하세요" name="0"
                                                value="" disabled/>
                                            <span class="ico_arr">
                                                <i class="blind">선택표시</i>
                                            </span>
                                        </div>
                                    </div>
                                </label>
                                <span class="reply">택스트를 입력하세요.</span>
                            </div>
                        </li>
                        <!-- 클래스(9자리) -->
                        <li>
                            <div class="a_group01"><!-- error, sucess 클래스 추가-->
                                <label class="area_tit01">
                                    <div class="left_box">
                                        <span class="txt01">클래스(9자리)</span>
                                    </div>
                                    <div class="right_box mt6">
                                        <div class="com_inp03"><!-- 클래스 변경 -->
                                            <input type="text" class="inp_comm" placeholder=" 클래스 9자리를 입력하세요." name="0"
                                                value="" disabled />
                                        </div>
                                    </div>
                                </label>
                                <span class="reply">택스트를 입력하세요.</span>
                            </div>
                            <div class="mt20">
                                <span class="caution04">
                                    플랜트, 예산관리센터 중 최소 하나의 항목에는 입력해야 합니다.
                                </span>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="area_footer04">
                <button type="button" class="btn_secondary">
                    <span class="txt">조회</span>
                </button>
            </div>
        </div>
    </div>

    <button class="btn_top">
        <i class="blind">위로이동</i>
    </button>
    
</body>

</html>
