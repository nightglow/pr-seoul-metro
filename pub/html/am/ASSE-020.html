<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>서울교통공사</title>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" type="text/css" href="../../css/common.css">

    <script src="../../js/jquery-3.5.1.min.js"></script>
    <script src="../../js/swiper-bundle.min.js"></script>
    <script src="../../js/common.js"></script>
</head>

<body>
    <div class="container">

        <div id="header"></div>

        <div class="contents">
            <div class="comm_pdd_no mt10">
                <div class="area_common01">
                    <ul class="common_content01">
                        <!-- 플랜트 -->
                        <li>
                            <div class="a_group01"><!-- error, sucess 클래스 추가-->
                                <label class="area_tit01">
                                    <div class="left_box">
                                        <span class="txt01">플랜트</span>
                                        <span class="txt02">*</span>
                                    </div>
                                    <div class="right_box mt6">
                                        <div class="com_inp01">
                                            <input type="text" class="inp_comm" placeholder="플랜트를 선택하세요." name="0"
                                                value="" disabled/>
                                            <span class="ico_arr">
                                                <i class="blind">선택표시</i>
                                            </span>
                                        </div>
                                    </div>
                                </label>
                                <span class="reply">택스트를 입력하세요.</span>
                            </div>
                        </li>
                        <!-- 저장위치 -->
                        <li>
                            <div class="a_group01"><!-- error, sucess 클래스 추가-->
                                <label class="area_tit01">
                                    <div class="left_box">
                                        <span class="txt01">저장 위치</span>
                                    </div>
                                    <div class="right_box mt6">
                                        <div class="com_inp01">
                                            <input type="text" class="inp_comm" placeholder="위치를 선택하세요." name="0"
                                                value="" disabled/>
                                            <span class="ico_arr">
                                                <i class="blind">선택표시</i>
                                            </span>
                                        </div>
                                    </div>
                                </label>
                                <span class="reply">택스트를 입력하세요.</span>
                            </div>
                        </li>
                        <li>
                            <div class="common_tit01">
                                <div class="left_box01">
                                    <span class="txt01">자재내역</span>
                                </div>
                            </div>
                            <div class="pick_search02">
                                <label class="blind">이름</label>
                                <input type="text" class="inp_srch" placeholder="자재내역을 입력하세요" />
                            </div>
                        </li>
                        <li>
                            <button type="button" class="btn_secondary">
                                <span class="txt">조회</span>
                            </button>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="divider04">
                <i class="blind">구분선</i>
            </div>

            <div class="comm_30de">
                <ul class="board_box01 mt10">
                    <li>
                        <div class="area_acquisition01">
                            <div class="left_box">
                                <span class="txt01">현수애자 - CLEVIS 254 X 146mm</span>
                                <span class="ico">
                                    <i class="blind">이동</i>
                                </span>
                            </div>
                            <div class="right_box">
                                <span class="txt02">신답전기관리소 창고</span>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="area_acquisition01">
                            <div class="left_box">
                                <span class="txt01">행거이어 - 170SQ L=1500mm SPECLAL TYPE</span>
                                <span class="ico">
                                    <i class="blind">이동</i>
                                </span>
                            </div>
                            <div class="right_box">
                                <span class="txt02">신답전기관리소 창고</span>
                            </div>
                        </div>
                    </li>
                </ul>
                <button type="button" class="btn_all mt20">
                    <span class="txt01">전체보기</span>
                </button>
            </div>
        </div>

        <!-- <div class="footer">
            <div class="area_footer03">
                <div class="f_group01">
                    <button type="button" class="btn_secondary">
                        <span class="txt">실사 대상 조회</span>
                    </button>
                </div>
            </div>
        </div> -->
    </div>

    <button class="btn_top">
        <i class="blind">위로이동</i>
    </button>
    
</body>

</html>
