<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>서울교통공사</title>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" type="text/css" href="../../css/common.css">

    <script src="../../js/jquery-3.5.1.min.js"></script>
    <script src="../../js/swiper-bundle.min.js"></script>
    <script src="../../js/common.js"></script>
</head>

<body>
    <div class="container">

        <div id="header"></div>

        <div class="contents">

            <div class="comm_pdd_no pt10">
                <div class="area_table01">
                    <table class="box_table01">
                        <caption class="blind">재물조사 실사 목록</caption>
                        <colgroup>
                            <col style="width: 35%;">
                            <col style="width: 65%;">
                        </colgroup>
                        <tbody>
                            <tr>
                                <td><span class="txt01">조사년도</span></td>
                                <td><span class="txt02">2026</span></td>
                            </tr>
                            <tr>
                                <td><span class="txt01">자산클래스</span></td>
                                <td><span class="txt02">1800, 공기구비품</span></td>
                            </tr>
                            <tr>
                                <td><span class="txt01">코스트센터</span></td>
                                <td><span class="txt02">10026, 경영지원.재무처</span></td>
                            </tr>
                            <tr>
                                <td><span class="txt01">예산관리센터</span></td>
                                <td><span class="txt02">10026, 재무처</span></td>
                            </tr>
                            <tr>
                                <td><span class="txt01">플랜트</span></td>
                                <td><span class="txt02">1000, 본사</span></td>
                            </tr>
                            <tr>
                                <td><span class="txt01">실사자</span></td>
                                <td><span class="txt02">김교통 23145512</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>

            <div class="divider04">
                <i class="blind">구분선</i>
            </div>
            
            <div class="comm_30de mt20">
                <div class="board_header01">
                    <span class="txt01">조회결과</span>
                    <span class="txt02">총<span class="txt03">32</span>건</span>
                </div>
                <div class="result_tit02">
                    <span class="txt01">조사완료 자산 건수 : <span class="txt02">5</span>건 </span>
                    <span class="txt01">조사미완료 자산 건수 : <span class="txt02">5</span>건 </span>
                </div>
                <button type="button" class="btn_quaternary mt10">
                    <span class="txt">QR인증 실사 진행</span>
                </button>

                <label class="cm_area01 mt10">
                    <input type="checkbox" name="c1" id="ck1_1">
                    <span class="cm_mark01 cm_check">
                        <i class="blind">아이콘</i>
                    </span>
                    <span class="txt01">완료된 건 목록에 표시 안함</span>
                </label>
                
                <button type="button" class="btn_refresh">
                    <span class="txt01">새로고침</span>
                </button>

                <ul class="area_check_list mt12">
                    <li>
                        <div class="real_auth">
                            <span class="badge">완료됨</span>
                            <div class="box_info">
                                <span class="txt01">1800001940-0</span>
                                <span class="txt02">책상, OA</span>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="real_auth type01"><!-- 미완료 : type01 클래스 추가 -->
                            <span class="badge">미완료</span>
                            <div class="box_info">
                                <span class="txt01">1800001940-0</span>
                                <span class="txt02">책상, OA</span>
                            </div>
                        </div>
                    </li>
                </ul>

            </div>
        </div>

        <!-- <div class="footer">
            <div class="area_footer04">
                <button type="button" class="btn_quaternary">
                    <span class="txt">QR인증 실사진행</span>
                </button>
                <button type="button" class="btn_secondary">
                    <span class="txt">확인</span>
                </button>
            </div>
        </div> -->
    </div>

    <button class="btn_top">
        <i class="blind">위로이동</i>
    </button>

</body>

</html>
