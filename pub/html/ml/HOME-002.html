		<script>
            // 모바일 친화적 드래그: pointer events + 길게 누르기(long-press)로 시작
            const grid = document.getElementById('drag_drop');
            const items = () => Array.from(grid.querySelectorAll('.item'));

            //window.addEventListener('dragstart', (e) => e.preventDefault());
            // 각 아이템에 포인터/터치 이벤트 바인딩

            grid.addEventListener('pointerdown', (e) => {
                const el = e.target.closest('.item');
                if (!el) return;
                e.preventDefault(); // 기본 동작 방지
                startLongPress(e, el);
            });
            grid.addEventListener('pointerup', (e) => {
                const el = e.target.closest('.item');
                if (!el) return;
                cancelLongPress(el);
            });
            grid.addEventListener('pointerleave', (e) => {
                const el = e.target.closest('.item');
                if (!el) return;
                cancelLongPress(el);
            });

            // 터치 이벤트 (iOS 사파리 대응)
            grid.addEventListener('touchstart', (e) => {
                const el = e.target.closest('.item');
                if (!el) return;
                if(e.touches.length > 1) return;
                startLongPress(e.touches[0], el);
            }, { passive: true });
            grid.addEventListener('touchend', (e) => {
                const el = e.target.closest('.item');
                if (!el) return;
                cancelLongPress(el);
            });

            let dragEl = null;
            let placeholder = null;
            let startX = 0, startY = 0;
            let offsetX = 0, offsetY = 0;
            let longPressTimer = null;
            let scrollAnimId = null;
            let lastY = 0;
            let lastX = 0;
            const LONG_PRESS_MS = 100; // 선택 감지 시간을 빠르게 설정

            // 아이템 위치 기준으로 드롭 대상 찾기
            function getSwapTarget(x, y) {
                const list = items();
                for (const el of list) {
                    if (el === placeholder || el === dragEl) continue;
                    const r = el.getBoundingClientRect();
                    // 포인터가 아이템 가운데 근처면 그 자리로
                    const cx = r.left + r.width / 2;
                    const cy = r.top + r.height / 2;
                    const dx = Math.abs(x - cx);
                    const dy = Math.abs(y - cy);
                    const hit = (dx < r.width * 0.6) && (dy < r.height * 0.6);
                    if (hit) return el;
                }
                return null;
			}

			function startLongPress(e, el) {
					clearTimeout(longPressTimer);
					el.classList.add('longpress');
					longPressTimer = setTimeout(() => {
					beginDrag(e, el);
                }, LONG_PRESS_MS);
			}

            function cancelLongPress(el) {
                clearTimeout(longPressTimer);
                el.classList.remove('longpress');
			}

			function beginDrag(e, el) {
				cancelLongPress(el);

				dragEl = el;
				const r = el.getBoundingClientRect();
				const container = document.querySelector('.right_box');
				const containerRect = container.getBoundingClientRect();
				
				// 포인터 이벤트 좌표 사용
				const clientX = e.clientX;
				const clientY = e.clientY;
				
				startX = clientX;
				startY = clientY;
				lastX = startX;
				lastY = startY;
				
				// offset 계산 (화면 기준)
				offsetX = clientX - r.left;
				offsetY = clientY - r.top;

				// placeholder 생성: 원래 자리를 표시
				placeholder = document.createElement('div');
				let icon = document.createElement('div');
				icon.className = 'ico';
				placeholder.insertBefore(icon,null);
				placeholder.className = 'item app_item placeholder';
				placeholder.style.width = r.width + 'px';
				placeholder.style.height = r.height + 'px';
				grid.insertBefore(placeholder, el.nextSibling);

                // 드래그 요소를 fixed 위치로 띄워서 뷰포트 어디서나 손가락 바로 아래에 있도록
                el.style.position = 'fixed';
                el.style.width = r.width + 'px';
                el.style.height = r.height + 'px';
                // 초기 위치는 현재 화면상의 위치
                el.style.left = r.left + 'px';
                el.style.top = r.top + 'px';
				el.classList.add('dragging');

				// 연속 스크롤 시작
				function autoScroll() {
					if (!dragEl) return;
					const scrollContainer = document.querySelector('.right_box');
					const rect = scrollContainer.getBoundingClientRect();
					
					// 스크롤 여유분에 따라 속도 조정
					const scrollSpeed = 30; 
					const scrollThreshold = 60; // 상/하단 60px 구간
					
					// 현재 스크롤 가능한 최대값
					const maxScroll = scrollContainer.scrollHeight - scrollContainer.clientHeight;
					
					// 드래그 포인터가 컨테이너 상단 근처면 위로 스크롤
					if (lastY - rect.top < scrollThreshold && scrollContainer.scrollTop > 0) {
						scrollContainer.scrollTop = Math.max(0, scrollContainer.scrollTop - scrollSpeed);
					} 
					// 드래그 포인터가 컨테이너 하단 근처면 아래로 스크롤
					else if (rect.bottom - lastY < scrollThreshold && scrollContainer.scrollTop < maxScroll) {
						scrollContainer.scrollTop = Math.min(maxScroll, scrollContainer.scrollTop + scrollSpeed);
					}
					
					scrollAnimId = requestAnimationFrame(autoScroll);
				}
				scrollAnimId = requestAnimationFrame(autoScroll);

				// 이동 리스너
                window.addEventListener('pointermove', onPointerMove, { passive: false });
                window.addEventListener('pointerup', endDrag);
                // 터치 이벤트 리스너 추가
                window.addEventListener('touchmove', onPointerMove, { passive: false });
                window.addEventListener('touchend', endDrag);
			}

			function onPointerMove(e) {
				if (!dragEl) return;
				
				e.preventDefault(); // 드래그 중 스크롤 방지
				let x = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
				let y = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
				
                // 기록용 좌표 저장
                lastX = x;
                lastY = y;

                // 뷰포트 기준으로 새 위치 계산 (fixed 요소)
                const newLeft = x - offsetX;
                const newTop = y - offsetY;
                dragEl.style.left = newLeft + 'px';
                dragEl.style.top = newTop + 'px';


				// 스와프 대상 찾기 (화면 기준 좌표로 판단)
				const target = getSwapTarget(x, y);
				if (target && target !== placeholder) {
                    const list = items();
                    const targetIndex = list.indexOf(target);
                    const placeholderIndex = list.indexOf(placeholder);
                    if (targetIndex < placeholderIndex) {
                        grid.insertBefore(placeholder, target);
                    } else {
                        grid.insertBefore(placeholder, target.nextSibling);
                    }
                }
			}

 			function endDrag() {
				if (!dragEl) return;
				
				// 스크롤 애니메이션 중단
				if (scrollAnimId) {
					cancelAnimationFrame(scrollAnimId);
					scrollAnimId = null;
				}
				
				// placeholder 자리로 복귀
				grid.insertBefore(dragEl, placeholder);
				dragEl.classList.remove('dragging');
				dragEl.style.position = '';
				dragEl.style.left = '';
				dragEl.style.top = '';
				dragEl.style.width = '';
				dragEl.style.height = '';
				dragEl = null;
				placeholder?.remove();
				placeholder = null;

                window.removeEventListener('pointermove', onPointerMove);
                window.removeEventListener('pointerup', endDrag);
                // 터치 이벤트 리스너 제거
                window.removeEventListener('touchmove', onPointerMove);
                window.removeEventListener('touchend', endDrag);
			}

		</script>
